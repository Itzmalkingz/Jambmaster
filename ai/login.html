<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMB Master - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Welcome to JAMB Master</h1>
            <p>Your complete guide to acing the JAMB exam</p>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <p class="auth-toggle">Don't have an account? <a href="signup.html">Sign up here</a></p>
            
            <div style="margin-top: 2rem; padding: 1rem; background: #f0f4ff; border-radius: 5px; font-size: 0.9rem;">
                <p><strong>Demo Account:</strong></p>
                <p>Email: test@example.com<br>Password: password123</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2.48.0"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
