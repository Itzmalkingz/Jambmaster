<body>

             <div class="logo"><a href="dashboard.html">📚 JAMB Master</a></div>

    <div class="container" style="padding: 2rem 0;">
        <h1>Settings</h1>
        
        <div class="settings-grid">
            <div class="settings-section">
                <h2>👤 Profile Information</h2>
                <form id="profile-form" onsubmit="updateProfile(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="profile-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="profile-email" required>
                    </div>
                    <div class="form-group">
                        <label>JAMB Exam Year</label>
                        <input type="number" id="profile-year" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>

            <div class="settings-section">
                <h2>🔐 Account Security</h2>
                <form id="password-form" onsubmit="changePassword(event)">
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="current-password" required>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="new-password" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirm-new-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </form>
            </div>

            <div class="settings-section">
                <h2>🔔 Notifications</h2>
                <div class="toggle-group">
                    <label class="toggle-item">
                        <span>Email Notifications</span>
                        <input type="checkbox" id="email-notif" checked>
                        <span class="toggle-switch"></span>
                    </label>
                    <label class="toggle-item">
                        <span>Daily Reminders</span>
                        <input type="checkbox" id="daily-reminder" checked>
                        <span class="toggle-switch"></span>
                    </label>
                    <label class="toggle-item">
                        <span>Achievement Alerts</span>
                        <input type="checkbox" id="achievement-alerts" checked>
                        <span class="toggle-switch"></span>
                    </label>
                </div>
            </div>

            <div class="settings-section danger-zone">
                <h2>⚠️ Danger Zone</h2>
                <button class="btn btn-danger" onclick="deleteAccount()">Delete Account</button>
            </div>
        </div>
    </div>
