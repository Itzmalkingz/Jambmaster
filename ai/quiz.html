             <div class="logo"><a href="dashboard.html">📚 JAMB Master</a></div>

    <div class="container" style="padding: 2rem 0;">
        <h1>Practice Quiz</h1>
        
        <div class="quiz-controls">
            <select id="subject-select" onchange="loadQuestions()">
                <option value="">Select Subject</option>
                <option value="english">English Language</option>
                <option value="math">Mathematics</option>
                <option value="physics">Physics</option>
                <option value="chemistry">Chemistry</option>
                <option value="biology">Biology</option>
            </select>
            
            <select id="difficulty-select" onchange="loadQuestions()">
                <option value="">All Levels</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <div id="quiz-container" class="quiz-container">
            <p class="placeholder-text">Select a subject to begin practicing</p>
        </div>

        <div id="quiz-results" class="quiz-results" style="display: none;"></div>
    </div>
