<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMB Master - Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Create Your Account</h1>
            <p>Start your journey to JAMB success</p>
            
            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" required placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label for="signup-confirm">Confirm Password</label>
                    <input type="password" id="signup-confirm" required placeholder="Confirm your password">
                </div>
                <div class="form-group">
                    <label for="signup-jamb-year">JAMB Exam Year</label>
                    <input type="number" id="signup-jamb-year" required placeholder="e.g., 2026">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>

            <p class="auth-toggle">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2.48.0"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
